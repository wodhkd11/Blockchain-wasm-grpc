<!DOCTYPE html>
<html>
<head>
    <title>Rust Chain Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <h2>Rust Node Test (Continuous TX)</h2>
    <button id="connectBtn" style="padding: 10px;">1. 메타마스크 연결</button>
    <button id="sendBtn" style="padding: 10px;" disabled>2. 서명 및 전송</button>
    <div id="log" style="margin-top: 20px; color: blue; white-space: pre-wrap; font-family: monospace;"></div>

    <script>
        let signer;

        // Rust의 u64(Big-Endian) 규격에 맞게 변환
        function toU64BeBytes(num) {
            const buffer = new ArrayBuffer(8);
            const view = new DataView(buffer);
            view.setBigUint64(0, BigInt(num), false); 
            return new Uint8Array(buffer);
        }

        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) return alert("메타마스크를 설치하세요!");
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const addr = await signer.getAddress();
                document.getElementById('log').innerText = "연결 성공: " + addr;
                document.getElementById('sendBtn').disabled = false;
            } catch (err) {
                alert("연결 실패: " + err.message);
            }
        };

        document.getElementById('sendBtn').onclick = async () => {
            try {
                const sender = await signer.getAddress();
                
                // --- [STEP 1] 서버로부터 최신 논스 받아오기 ---
                document.getElementById('log').innerText = "최신 논스 조회 중...";
                const nonceRes = await fetch(`http://localhost:10000/nonce/${sender}`);
                if (!nonceRes.ok) throw new Error("논스를 가져오지 못했습니다.");
                const nonce = await nonceRes.json(); // 서버에서 숫자를 직접 반환한다고 가정

                // --- [STEP 2] 트랜잭션 데이터 준비 ---
                const receiver = "0x0000000000000000000000000000000000000000";
                const value = 1000;
                const payload = new Uint8Array([1, 2, 3]);

                const senderBytes = ethers.utils.arrayify(sender);
                const receiverBytes = ethers.utils.arrayify(receiver);
                const valueBytes = toU64BeBytes(value);
                const nonceBytes = toU64BeBytes(nonce);

                // Rust 서버의 verify_signature와 동일한 직렬화 순서
                const finalMessage = ethers.utils.concat([
                    senderBytes,
                    receiverBytes,
                    valueBytes,
                    nonceBytes,
                    payload
                ]);

                document.getElementById('log').innerText = `서명 요청 중... (Nonce: ${nonce})`;

                // --- [STEP 3] 메타마스크 서명 ---
                const signature = await signer.signMessage(finalMessage);
                
                // --- [STEP 4] Rust 서버로 전송 ---
                const res = await fetch("http://localhost:10000/transaction", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        sender: Array.from(senderBytes),
                        receiver: Array.from(receiverBytes),
                        value: value,
                        nonce: nonce, // 서버에서 받아온 논스 사용
                        payload: Array.from(payload),
                        signature: Array.from(ethers.utils.arrayify(signature))
                    })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`서버 에러 (${res.status}): ${errText}`);
                }

                const data = await res.json();
                document.getElementById('log').innerText = `✅ 검증 성공! (Nonce: ${nonce})\nTX Hash: ${JSON.stringify(data)}`;
            } catch (err) {
                console.error(err);
                document.getElementById('log').innerText = "❌ 에러 발생:\n" + err.message;
            }
        };
    </script>
</body>
</html>
